name: Glasshouse Agent Sync — TEST

# ─────────────────────────────────────────────────────────────────────────────
# THIS WORKFLOW IS FOR THE sync-testing BRANCH ONLY.
#
# What this is:
#   - A clone of the production sync workflow
#   - Runs against the BoldTrail API (read-only, same as production)
#   - Writes ONLY to agents-test.json on this branch
#   - Never pushes to main
#   - Never touches the live agents.json
#
# Where the test data is consumed:
#   The Lofty test page fetches from raw.githubusercontent.com:
#   https://raw.githubusercontent.com/evansvince/glasshouse-data/sync-testing/agents-test.json
#
# Why no cron:
#   GitHub Actions schedules only run on the default branch (main), so a cron
#   here would never fire anyway. We document this explicitly to make the
#   manual-only nature obvious. Test runs are always workflow_dispatch.
#
# CHANGELOG
#   2026-05-15 — added SYNC_ENABLE_CLEVELAND=true so this workflow exercises
#                the Cleveland BoldTrail fetch. Production keeps the flag off
#                until we've validated the Cleveland integration here.
#   2026-05-15 — added BOLDTRAIL_API_KEY_CLEVELAND for the Cleveland account fetch
#   2026-05-15 — added Pillow install + photo optimizer pass (matches production)
#   2026-05-15 — added profile-url-cache.json + agent-photos/ to the commit
#   2026-06-22 — replaced the legacy gh-photo-optimizer.py + gh-lofty-scraper.py
#                steps with the unified gh-photo-pipeline.py (matches production),
#                run with --agents-file agents-test.json --skip-cleanup. This
#                gives Cleveland/Asa Cox agents BoldTrail-headshot acquisition
#                (Source A) while keeping existing roster data and profile links
#                intact when BoldTrail has no headshot. Validate here before prod.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview only, no files written'
        required: false
        default: 'true'    # Safe default
        type: choice
        options: ['true', 'false']

jobs:
  sync-agents-test:
    name: "Sync Agents to agents-test.json (TEST branch)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Hard guard: this job is allowed to run only on the sync-testing branch.
    # If someone copies this workflow to main by mistake, the job exits.
    if: github.ref == 'refs/heads/sync-testing'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: sync-testing
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify we are on sync-testing
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH" != "sync-testing" ]; then
            echo "ABORT: workflow expects branch sync-testing, got $BRANCH"
            exit 1
          fi
          echo "Branch verified: $BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine run mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.dry_run }}"
          if [ -z "$MODE" ]; then MODE="true"; fi
          echo "dry_run=$MODE" >> $GITHUB_OUTPUT
          echo "Run mode: dry_run=$MODE"

      - name: Run agent sync against agents-test.json (READ ONLY from BoldTrail)
        id: sync
        env:
          # Dayton BoldTrail account
          BOLDTRAIL_API_KEY:           ${{ secrets.BOLDTRAIL_API_KEY }}
          # Cleveland BoldTrail account (Asa Cox Homes)
          BOLDTRAIL_API_KEY_CLEVELAND: ${{ secrets.BOLDTRAIL_API_KEY_CLEVELAND }}
          # Enable Cleveland fetch for THIS workflow only. Production sync-all.yml
          # leaves this unset so its default (off) is used.
          SYNC_ENABLE_CLEVELAND: 'true'
        run: |
          # CRITICAL: --out agents-test.json keeps writes away from the live file
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            python3 gh-agents-sync-bt.py --dry-run --out agents-test.json 2>&1 | tee sync-output.txt
          else
            python3 gh-agents-sync-bt.py --out agents-test.json 2>&1 | tee sync-output.txt
          fi
          SUMMARY=$(grep "^REPORT_SUMMARY=" sync-output.txt | tail -1 | sed 's/REPORT_SUMMARY=//')
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          if [ -f SYNC_EVENT ]; then
            echo "has_event=true" >> $GITHUB_OUTPUT
            echo "event_body<<EOF" >> $GITHUB_OUTPUT
            cat SYNC_EVENT >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_event=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Pillow for photo pipeline
        if: steps.mode.outputs.dry_run != 'true'
        run: pip install --quiet Pillow

      - name: Photo acquisition pipeline (TEST → agents-test.json)
        if: steps.mode.outputs.dry_run != 'true'
        env:
          # Photos committed on sync-testing are NOT served by GitHub Pages
          # (Pages serves main only), so the default github.io URLs would 404 on
          # the test page. Serve test photos from the sync-testing branch's raw
          # URL instead. Production leaves this unset and uses the Pages default.
          PHOTO_PUBLIC_BASE: 'https://raw.githubusercontent.com/evansvince/glasshouse-data/sync-testing/agent-photos'
        run: |
          # Mirror production: the unified pipeline owns every photo end-to-end,
          # replacing the legacy optimizer + Lofty scraper here so TEST matches
          # PROD before the Cleveland cutover.
          #   - Source A: BoldTrail S3 (avatar_added=true) — wins over an
          #               existing photo, so a Cleveland/Asa Cox headshot
          #               uploaded to BoldTrail replaces the placeholder.
          #               Dayton behaves exactly as before.
          #   - Source B: Lofty scrape — DAYTON ONLY. Cleveland agents have no
          #               Lofty profile pages and are never scraped.
          #   - Source C/D: keep the existing photo when BoldTrail has no
          #               headshot — so Cleveland roster data stays INTACT
          #               unless/until a real headshot appears in BoldTrail.
          #   profileUrl is never touched by the pipeline — existing agent
          #   profile links are preserved as-is.
          # --skip-cleanup: critical in TEST. The orphan sweep compares
          #   agent-photos/ against the loaded file; agents-test.json is a
          #   subset, so without this flag the test run could delete production
          #   photos. Never let TEST clean up photo files.
          # Failures here never block the sync — `|| true` keeps workflow going.
          python3 gh-photo-pipeline.py --agents-file agents-test.json --skip-cleanup \
            || true

      - name: Belt-and-suspenders — verify live agents.json was not touched
        if: always()
        run: |
          # If somehow the script wrote to agents.json, fail loudly and refuse
          # to commit anything. The git status check is a final safety net.
          if git status --porcelain agents.json | grep -q "agents.json"; then
            echo "FATAL: agents.json was modified during a TEST run!"
            echo "This should be impossible — the script was invoked with --out agents-test.json"
            git status
            git checkout -- agents.json
            exit 1
          fi
          echo "✓ agents.json is untouched (as expected)"

      - name: Commit test report + agents-test.json to sync-testing only
        if: steps.mode.outputs.dry_run != 'true'
        run: |
          git config user.name  "Glasshouse Sync Bot (TEST)"
          git config user.email "sync-test@glasshouserealty.com"
          # Explicitly stage only test artifacts. agents.json is NEVER staged.
          git add agents-test.json reports/ 2>/dev/null || true
          # Unified photo pipeline outputs (mirrors production)
          git add agent-photos/ photo-pipeline-state.json 2>/dev/null || true
          git add reports/photo-pipeline/ 2>/dev/null || true
          # Profile URL verification cache
          git add profile-url-cache.json 2>/dev/null || true
          # Only stage backups/ if the script wrote BACKUP_COMMIT
          if [ -f BACKUP_COMMIT ]; then
            git add backups/ 2>/dev/null || true
          fi
          # If anyone accidentally added agents.json, unstage it
          git reset HEAD agents.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          COUNT=$(python3 -c "
          import json
          d = json.load(open('agents-test.json'))
          print(len([a for a in d if not a.get('hidden')]))")
          git commit -m "TEST sync — ${COUNT} agents in agents-test.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Push only this branch, never main
          git push origin sync-testing

      - name: Commit dry-run reports to sync-testing
        if: steps.mode.outputs.dry_run == 'true'
        run: |
          git config user.name  "Glasshouse Sync Bot (TEST)"
          git config user.email "sync-test@glasshouserealty.com"
          git add reports/ 2>/dev/null || true
          git reset HEAD agents.json agents-test.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No report changes"
          else
            git commit -m "TEST dry-run reports [$(date -u '+%Y-%m-%d')]"
            git push origin sync-testing
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## TEST Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | sync-testing |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ steps.mode.outputs.dry_run == 'true' && 'dry-run' || 'LIVE (writes agents-test.json)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleveland fetch | ENABLED (test workflow) |" >> $GITHUB_STEP_SUMMARY
          echo "| Output file | agents-test.json |" >> $GITHUB_STEP_SUMMARY
          echo "| Has events | ${{ steps.sync.outputs.has_event }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Summary | ${{ steps.sync.outputs.summary }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f agents-test.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('agents-test.json')); print(len([a for a in d if not a.get('hidden')]))")
            echo "| Visible agents in test file | ${COUNT} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test data URL:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/evansvince/glasshouse-data/sync-testing/agents-test.json" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f SYNC_EVENT ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Events this run" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat SYNC_EVENT >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
