    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'sold-cleveland' || github.event.inputs.job == 'all'))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
