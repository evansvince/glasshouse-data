          fi
          COUNT=$(python3 -c "import json; print(len(json.load(open('sold-cleveland.json'))))")
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "Auto-sync sold Cleveland — ${COUNT} records [${TIMESTAMP}]"
          git push
